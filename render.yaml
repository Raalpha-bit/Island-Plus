services:
  # Configuration pour le Backend NestJS
  - type: web
    name: island-plus-backend
    env: node
    region: frankfurt
    rootDir: Island-Plus-Backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: island-plus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Configuration pour le Frontend Next.js
  - type: web
    name: island-plus-frontend
    env: node
    region: frankfurt
    rootDir: Island+
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: island-plus-backend
          property: url

# Base de données PostgreSQL (Gratuite sur Render)
databases:
  - name: island-plus-db
    databaseName: islandplus
    user: islanduser
    region: frankfurt
