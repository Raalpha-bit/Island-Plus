version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: island_plus_postgres
    environment:
      POSTGRES_USER: island_user
      POSTGRES_PASSWORD: island_password
      POSTGRES_DB: island_plus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
